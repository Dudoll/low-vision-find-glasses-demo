runtime:
  target_fps: 5
  frame_queue_size: 1
  max_frame_latency_ms: 200
  drop_stale_frames: true

vision:
  # Phase 4 supports "mock" by default and optional "yolo" via the vision extra.
  detector: mock
  model_path: models/yolo/yolo11n.onnx
  input_size: 416
  conf_threshold: 0.35
  iou_threshold: 0.45
  device: cpu

distance:
  source: depth_frame
  very_near_m: 0.5
  near_m: 1.0
  mid_m: 2.0
  far_m: 3.0

cue:
  mode: terminal
  min_interval_ms: 800
  same_message_interval_ms: 2000
  distance_change_threshold_m: 0.3

voice:
  wake_word:
    # Phase 5 default is manual; set to openwakeword when model/dependency is installed.
    engine: manual
    model_path: null
    threshold: 0.5
  asr:
    # Phase 5 default accepts already-transcribed stdin text.
    # Optional engines: vosk, whisper_cpp.
    engine: stdin
    model_path: null
    sample_rate: 16000
    whisper_cpp_binary: null
    language: zh
  tts:
    # Terminal output is queued so it does not block the vision loop.
    engine: terminal
    queue_size: 8

simulator:
  engine: ai2thor
  scene: FloorPlan201
  width: 640
  height: 480
  fov: 90
  render_depth: true
